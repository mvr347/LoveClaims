# ====================================================== #
#              AdvancedClaims - Якоря                    #
# ====================================================== #
# Конфигурация уровней якорей для создания приватов.
# 
# ===== МОЖНО ЛИ ИЗМЕНЯТЬ ТИРЫ? =====
# 
# ✅ ДА! Вы можете безопасно:
# - Добавлять новые тиры (tier-7, tier-8, и т.д.)
# - Удалять существующие тиры
# - Изменять радиусы и материалы
# - Изменять названия и описания
# 
# Плагин НЕ сломается! Тиры загружаются динамически
# при старте сервера из этого файла.
# 
# ===== КАК ДОБАВИТЬ НОВЫЙ ТИР =====
# 1. Скопируйте структуру существующего тира
# 2. Измените ID на новый (например, tier-7)
# 3. Настройте материал, радиусы, название
# 4. Сохраните файл и выполните /ac admin reload
# 
# ===== КАК УДАЛИТЬ ТИР =====
# 1. Удалите секцию тира из этого файла
# 2. Сохраните и выполните /ac admin reload
# 
# Примечание: Игроки, у которых уже есть якоря
# удалённого тира, сохранят свои приваты.
# 
# ===== ВАЖНЫЕ ПОЛЯ =====
# - material: Блок якоря (обязательно)
# - radius-x/y/z: Размер привата (обязательно)
# - name: Название предмета (MiniMessage)
# - lore: Описание предмета (список строк)
# - max-radius: Максимальное расширение
# - custom-model-data: Кастомная модель (0 = нет)
# - permission: Требуемая пермишн ("none" = всем)
# - create-cost: Стоимость создания (0 = бесплатно)
# - border-color: Цвет границы (RGB)
# - place-sound: Звук установки
# - break-sound: Звук разрушения
# ====================================================== #

tiers:
  # ===== ТИР 1: НАЧИНАЮЩИЙ =====
  # Базовый уровень для новых игроков
  # Размер привата: 17x17x17 блоков (радиус 8)
  tier-1:
    # Материал якоря - блок, который используется как якорь
    # Доступные материалы: CAMPFIRE, SOUL_CAMPFIRE, LANTERN, и т.д.
    material: "CAMPFIRE"
    
    # Название предмета в инвентаре
    # Использует MiniMessage форматирование
    name: "<green>Якорь Привата I</green>"
    
    # Описание предмета (lore)
    # Каждая строка - новая линия в описании
    lore:
      - "<gray>Создаёт приват размером 17x17x17</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 8 блоков</gray>"
      - "<gray>• Высота: 17 блоков</gray>"
      - "<gray>• Макс. расширение: 9 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
    
    # Радиус привата по оси X (половина ширины)
    # Общий размер = radius-x * 2 + 1
    radius-x: 8
    
    # Радиус привата по оси Y (высота)
    # Общий размер = radius-y * 2 + 1
    radius-y: 8
    
    # Радиус привата по оси Z (половина длины)
    # Общий размер = radius-z * 2 + 1
    radius-z: 8
    
    # Максимальный радиус для расширения
    # Игроки могут расширить приват до этого значения
    max-radius: 9
    
    # CustomModelData для кастомной текстуры
    # 0 = без кастомной модели
    # >0 = использовать модель с этим ID
    custom-model-data: 0
    
    # Требуемая пермишн для использования
    # "none" = доступно всем
    # "loveclaims.anchor.tier-1" = нужна пермишн
    permission: "none"
    
    # Стоимость создания привата (в валюте)
    # 0 = бесплатно
    create-cost: 0
    
    # Цвет границы привата (RGB)
    # Используется для визуализации границ
    border-color:
      red: 0
      green: 255
      blue: 0
    
    # Звук при установке якоря
    place-sound: "BLOCK_BEACON_ACTIVATE"
    
    # Звук при удалении якоря
    break-sound: "BLOCK_NOTE_BLOCK_BASS"

  # ===== ТИР 2: ОПЫТНЫЙ =====
  # Для игроков с опытом
  # Размер привата: 21x21x21 блоков (радиус 10)
  tier-2:
    material: "SOUL_CAMPFIRE"
    name: "<aqua>Якорь Привата II</aqua>"
    lore:
      - "<gray>Создаёт приват размером 21x21x21</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 10 блоков</gray>"
      - "<gray>• Высота: 21 блоков</gray>"
      - "<gray>• Макс. расширение: 15 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
    radius-x: 10
    radius-y: 10
    radius-z: 10
    max-radius: 15
    custom-model-data: 0
    permission: "none"
    create-cost: 100
    border-color:
      red: 0
      green: 255
      blue: 255
    place-sound: "BLOCK_SOUL_SPAWN_PLACE"
    break-sound: "BLOCK_SOUL_SPAWN_BREAK"

  # ===== ТИР 3: ЭКСПЕРТ =====
  # Для опытных игроков
  # Размер привата: 33x33x33 блоков (радиус 16)
  tier-3:
    material: "LANTERN"
    name: "<light_purple>Якорь Привата III</light_purple>"
    lore:
      - "<gray>Создаёт приват размером 33x33x33</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 16 блоков</gray>"
      - "<gray>• Высота: 33 блоков</gray>"
      - "<gray>• Макс. расширение: 32 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
    radius-x: 16
    radius-y: 16
    radius-z: 16
    max-radius: 32
    custom-model-data: 0
    permission: "none"
    create-cost: 500
    border-color:
      red: 255
      green: 0
      blue: 255
    place-sound: "BLOCK_BELL_USE"
    break-sound: "BLOCK_BELL_RESONATE"

  # ===== ТИР 4: МАСТЕР =====
  # Для мастеров выживания
  # Размер привата: 65x65x65 блоков (радиус 32)
  tier-4:
    material: "SOUL_LANTERN"
    name: "<gold>Якорь Привата IV</gold>"
    lore:
      - "<gray>Создаёт приват размером 65x65x65</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 32 блоков</gray>"
      - "<gray>• Высота: 65 блоков</gray>"
      - "<gray>• Макс. расширение: 64 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
    radius-x: 32
    radius-y: 32
    radius-z: 32
    max-radius: 64
    custom-model-data: 0
    permission: "none"
    create-cost: 2000
    border-color:
      red: 255
      green: 255
      blue: 0
    place-sound: "BLOCK_BEACON_ACTIVATE"
    break-sound: "BLOCK_BEACON_DEACTIVATE"

  # ===== ТИР 5: ЛЕГЕНДАРНЫЙ =====
  # Для легенд сервера
  # Размер привата: 129x129x129 блоков (радиус 64)
  tier-5:
    material: "DRAGON_EGG"
    name: "<dark_purple>Якорь Привата V</dark_purple>"
    lore:
      - "<gray>Создаёт приват размером 129x129x129</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 64 блоков</gray>"
      - "<gray>• Высота: 129 блоков</gray>"
      - "<gray>• Макс. расширение: 128 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
    radius-x: 64
    radius-y: 64
    radius-z: 64
    max-radius: 128
    custom-model-data: 0
    permission: "loveclaims.anchor.tier-5"
    create-cost: 10000
    border-color:
      red: 128
      green: 0
      blue: 128
    place-sound: "ENTITY_ENDER_DRAGON_GROWL"
    break-sound: "ENTITY_ENDER_DRAGON_DEATH"

  # ===== ТИР 6: БОЖЕСТВЕННЫЙ =====
  # Максимальный уровень
  # Размер привата: 257x257x257 блоков (радиус 128)
  tier-6:
    material: "BEACON"
    name: "<white>Якорь Привата VI</white>"
    lore:
      - "<gray>Создаёт приват размером 257x257x257</gray>"
      - ""
      - "<white>Характеристики:</white>"
      - "<gray>• Радиус: 128 блоков</gray>"
      - "<gray>• Высота: 257 блоков</gray>"
      - "<gray>• Макс. расширение: 256 блоков</gray>"
      - ""
      - "<yellow>ПКМ для установки</yellow>"
      - ""
      - "<rainbow>Легендарный якорь!</rainbow>"
    radius-x: 128
    radius-y: 128
    radius-z: 128
    max-radius: 256
    custom-model-data: 1
    permission: "loveclaims.anchor.tier-6"
    create-cost: 50000
    border-color:
      red: 255
      green: 255
      blue: 255
    place-sound: "UI_TOAST_CHALLENGE_COMPLETE"
    break-sound: "BLOCK_END_PORTAL_SPAWN"
