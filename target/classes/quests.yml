# ====================================================== #
#              AdvancedClaims - Квесты                   #
# ====================================================== #
# Полная поддержка всех типов квестов для Minecraft 1.21+
# 
# ТИПЫ КВЕСТОВ:
# - MINE_BLOCKS       : Добыча блоков (кирка)
# - KILL_MOBS         : Убийство мобов (меч/лук)
# - PLACE_BLOCKS      : Установка блоков (строительство)
# - CRAFT_ITEMS       : Крафт предметов (верстак)
# - FISH              : Рыбалка (удочка)
# - BREAK_CROPS       : Сбор урожая (мотыга)
# - BREED_ANIMALS     : Разведение животных (еда)
# - TRADE_VILLAGERS   : Торговля с жителями (изумруды)
# - ENCHANT_ITEMS     : Зачарование предметов (стол зачарования)
# - BREW_POTIONS      : Варка зелий (зельеварка)
# - COMPLETE_RAIDS    : Завершение рейдов (защита деревни)
# - EXPLORE_STRUCTURES: Исследование структур (путешествия)
# - COLLECT_ITEMS     : Сбор предметов (коллекционирование)
# - USE_ITEMS         : Использование предметов
# - CUSTOM            : Кастомный квест (через команды API)
#
# СЛОЖНОСТЬ:
# - EASY      : Легкий (начальный уровень)
# - MEDIUM    : Средний (опытный уровень)
# - HARD      : Сложный (экспертный уровень)
# - LEGENDARY : Легендарный (мастер уровень)
# - BOSS      : Босс (победа над боссами)
# - EVENT     : Событие (сезонные квесты)
# - TEAM      : Командный (требует группы)
#
# КАТЕГОРИИ:
# MINING, FARMING, FISHING, BUILDING, COMBAT, CRAFTING,
# MAGIC, TRADING, EXPLORATION, COLLECTION, TEAM, EVENT
# ====================================================== #

quests:
