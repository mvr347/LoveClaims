# ====================================================== #
#           AdvancedClaims - Файл локализации            #
# ====================================================== #
# Все сообщения плагина на русском языке.
# 
# Формат сообщений:
# - Одна строка: key: "текст"
# - Несколько строк: key: ["строка1", "строка2"]
# 
# Специальные значения:
# - "NONE" или "none" - не выводить сообщение (скрыто)
# - "" (пусто) - не выводить сообщение
# 
# Цвета (MiniMessage):
# <black>, <dark_blue>, <dark_green>, <dark_aqua>,
# <dark_red>, <dark_purple>, <gold>, <gray>, <dark_gray>,
# <blue>, <green>, <aqua>, <red>, <light_purple>, <yellow>, <white>
# 
# Форматирование:
# <bold> - жирный, <italic> - курсив, <underlined> - подчеркнутый
# <strikethrough> - зачеркнутый, <obfuscated> - мерцающий
# 
# Переменные:
# {player} - имя игрока, {amount} - количество, {name} - название
# ====================================================== #

prefix: "<dark_gray>[<gold>AC<dark_gray>] <white>"

